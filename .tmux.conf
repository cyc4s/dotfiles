# =============================================================================
# tmux 設定
# =============================================================================

# --- Prefix キー ---
# デフォルトの Ctrl+b を解除し、Ctrl+g に変更
unbind C-b
set -g prefix C-g
bind C-g send-prefix

# --- ペイン分割 ---
# \ で横分割、- で縦分割
bind \\ split-window -h
bind - split-window -v

# --- ペイン番号の表示時間 ---
# Prefix + q で表示されるペイン番号の表示時間（ミリ秒）
set -g display-panes-time 2000

# --- Vi モードのコピー操作 ---
# コピーモードで Vim 風の操作を有効化
set -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection

# --- ESC 遅延の解消 ---
# Vim/Neovim で ESC の反応を速くする（デフォルト 500ms → 0ms）
set -s escape-time 0

# --- エスケープシーケンスのパススルー ---
# WezTerm 等のターミナルが送る DCS シーケンスを tmux 経由で通す
# これがないとシェルに漏れて空ファイルが作られる等の問題が起きる
set -g allow-passthrough on

# --- マウス操作 ---
# マウスでペイン選択、リサイズ、スクロールを有効化
set -g mouse on
bind-key -T edit-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T edit-mode-vi WheelDownPane send-keys -X scroll-down
